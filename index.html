<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AquaKit</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/blockly@9.0.1/blockly.min.js"></script>
  <script src="https://unpkg.com/blockly@9.0.1/javascript_compressed.js"></script>

  <style>
    :root { --nav-height: 64px; --accent: #0ea5a4; --bg: #f6f8fa; --nav-bg: #ffffff; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Poppins", sans-serif; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .nav { height: var(--nav-height); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; background: var(--nav-bg); box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--accent); font-weight: 600; }
    .logo .icon { width: 36px; height: 36px; border-radius: 8px; display: inline-grid; place-items: center; color: #fff; background: linear-gradient(135deg, var(--accent), #06b6d4); }
    .view-select { padding: 8px 10px; border-radius: 8px; border: 1px solid #e6eef2; font-weight: 600; }
    .play { width: 44px; height: 44px; border-radius: 50%; border: 0; background: var(--accent); color: white; cursor: pointer; display: inline-grid; place-items: center; margin-left: 8px; }
    main { flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 16px; overflow: hidden; }
    #editorWrap, #blocksArea { flex: 1; border-radius: 8px; border: 1px solid #e6eef2; background: #fff; display: flex; overflow: hidden; }
    #blocklyDiv { width: 100%; height: 100%; }
    #editor { flex: 1; padding: 12px; border: none; font-family: monospace; outline: none; font-size: 14px; resize: none; }
    .status { font-weight: 600; padding: 6px 12px; border-radius: 12px; font-size: 14px; white-space: nowrap; flex-shrink: 0; min-width: fit-content;}
    .status.connected { color: #16a34a; background: #dcfce7; border: 1px solid #86efac; }
    .status.disconnected { color: #b91c1c; background: #fee2e2; border: 1px solid #fecaca; }
  </style>
</head>
<body>

  <header class="nav">
    <a class="logo" href="#"><span class="icon">A</span><span>AquaKit</span></a>

    <div style="display: flex; align-items: center; gap: 8px;">
      <div id="connectionStatus" class="status disconnected">Disconnected</div>
      <div id="depthBadge" class="status" style="background: #e0f2fe; color: #0369a1; margin-left:10px;">
        Depth: -- cm
      </div>
      <div id="timeBadge" class="status" style="background: #fef9c3; color: #854d0e; margin-left:10px;">

      </div>
    </div>

    <!-- <div id="connectionStatus" class="status disconnected">Disconnected</div> -->

      <option value="code">Code View</option>
    </select>
    <div>
      <button id="connectBtn" class="play">🔗</button>
      <button id="playBtn" class="play">▶</button>
    </div>
    <select id="connectionMode" class="view-select">

      <option value="ble">Bluetooth (BLE)</option>
    </select>
  </header>

  <main>
    <div id="blocksArea"><div id="blocklyDiv"></div></div>
    <div id="editorWrap" style="display:none;"><textarea id="editor" readonly></textarea></div>
    <!-- <input type="color" id="pixel-color-picker"> -->
  </main>

  <xml id="toolbox" style="display:none">
    <category name="Events" colour="#45b39d"><block type="on_start"></block></category>
    <category name="Loops" colour="#f39c12">
      <block type="forever"></block>
      <block type="repeat_n_times"></block>
    </category>
    <category name="Logic" colour="#FF0000">
      <block type="if_block"></block>
      <block type="logic_compare"></block>
      <block type="logic_operation"></block>
      <block type="block_true"></block>
      <block type="block_false"></block>
      <block type="if_else"></block>
    </category>
    <category name="Control" colour="#f1c40f"><block type="delay"></block></category>
    <category name="Devices" colour="#9b59b6">
      <block type="turn_device"></block>
      <block type="set_led_color"></block>
      <block type="set_pixel_color"></block>
      <block type="ring_pattern_block"></block>
    </category>
    <category name="Variables" colour="#ff4da6" custom="VARIABLE"></category>
    <category name="Sensors" colour="#3498db">
      <block type="get_water_depth"></block>
      <block type="get_rtc_time"></block>
    </category>
  </xml>

    class FieldLedRing extends Blockly.Field {
      constructor(value, validator) {
          const defaultValue = Array(24).fill('#000000').join(',');
          super(value || defaultValue, validator);
          this.size_ = new Blockly.utils.Size(300, 300);
          this.SERIALIZABLE = true;
      }

      static fromJson(options) {
          return new FieldLedRing(options['value']);
      }

      // CRITICAL: Tells Blockly this field is clickable
      isClickable() { return true; }

      initView() {
        this.group_ = Blockly.utils.dom.createSvgElement('g', {
            'class': 'fieldLedGroup'
        }, this.fieldGroup_);

        // Background Circle
        Blockly.utils.dom.createSvgElement('circle', {
            'cx': 150, 'cy': 150, 'r': 130,
            'fill': '#222', 'stroke': '#111', 'stroke-width': '2'
        }, this.group_);

        // --- NEW: CENTER COLOR PICKER ---
        // We embed the HTML input directly into the SVG center
        const foreignObject = Blockly.utils.dom.createSvgElement('foreignObject', {
            'x': 110, 'y': 110, 'width': 80, 'height': 80
        }, this.group_);

        const pickerDiv = document.createElement('div');
        pickerDiv.style.width = '100%';
        pickerDiv.style.height = '100%';
        pickerDiv.style.display = 'flex';
        pickerDiv.style.alignItems = 'center';
        pickerDiv.style.justifyContent = 'center';

        const picker = document.createElement('input');
        picker.type = 'color';
        picker.id = 'inner-color-picker';
        picker.value = '#eeeeee';
        picker.style.width = '80px';
        picker.style.height = '80px';
        picker.style.cursor = 'pointer';
        picker.style.border = 'none';
        picker.style.background = 'none';
        
        // Prevent block dragging when clicking the picker
        picker.onmousedown = (e) => e.stopPropagation();

        pickerDiv.appendChild(picker);
        foreignObject.appendChild(pickerDiv);
        this.internalPicker = picker;

        // --- LED GENERATION ---
        this.ledElements = [];
        const radius = 100;
        const centerX = 150;
        const centerY = 150;

        for (let i = 0; i < 24; i++) {
            const angle = (i / 24) * 2 * Math.PI - Math.PI / 2;
            const x = centerX + radius * Math.cos(angle);
            const y = centerY + radius * Math.sin(angle);

            const led = Blockly.utils.dom.createSvgElement('circle', {
                'cx': x, 'cy': y, 'r': 12,
                'fill': '#000000',
                'stroke': '#555',
                'stroke-width': '1',
                'style': 'cursor: pointer; pointer-events: all;'
            }, this.group_);

            // Use the internal picker in the center
            Blockly.browserEvents.conditionalBind(led, 'mousedown', this, (e) => {
                e.stopPropagation(); 
                const color = this.internalPicker.value;
                this.setLedColor(i, color);
            });

            led.onmouseenter = () => led.setAttribute('stroke', '#ffffff');
            led.onmouseleave = () => led.setAttribute('stroke', '#555');

            this.ledElements.push(led);
          }
          this.updateView_();
      }

      setLedColor(index, color) {
          const colors = this.getValue().split(',');
          // Toggle logic: If clicking the same color, turn it off (black)
          if (colors[index] === color) {
              colors[index] = '#000000';
          } else {
              colors[index] = color;
          }
          this.setValue(colors.join(','));
          this.updateView_();
      }

      updateView_() {
          if (!this.ledElements) return;
          const colors = this.getValue().split(',');
          colors.forEach((color, i) => {
              if (this.ledElements[i]) {
                  this.ledElements[i].setAttribute('fill', color);
              }
          });
      }

      getSize() { return this.size_; }
    }

    Blockly.fieldRegistry.register('field_led_ring', FieldLedRing);

    // 3. Your Generators (Fixed String Literals)
    Blockly.JavaScript['on_start'] = function(block) {
      const statements = Blockly.JavaScript.statementToCode(block, 'DO');
      return '4,0,0,0,0\n' + statements;
    };

    Blockly.JavaScript['forever'] = function(block) {
      const statements = Blockly.JavaScript.statementToCode(block, 'DO');
      return '3,0,0,0,0\n' + statements;
    };

    Blockly.JavaScript['delay'] = function(block) {
      const delayTime = parseInt(block.getFieldValue('DELAY_TIME')) || 1000;
      const unit = block.getFieldValue('UNIT');
      let milliseconds = 0;
      switch (unit) {
        case 'ms': milliseconds = delayTime; break;
        case 's': milliseconds = delayTime * 1000; break;
        case 'm': milliseconds = delayTime * 60000; break;
      }
      const b1 = milliseconds & 0xFF;
      const b2 = (milliseconds >> 8) & 0xFF;
      const b3 = (milliseconds >> 16) & 0xFF;
      const b4 = (milliseconds >> 24) & 0xFF;
      return `2,${b1},${b2},${b3},${b4}\n`;
    };

    Blockly.JavaScript['turn_device'] = function(block) {
      const device = block.getFieldValue('DEVICE');
      const state = block.getFieldValue('STATE');
      return `0,${device},${state},0,0\n`;
    };

    Blockly.JavaScript['set_led_color'] = function(block) {
      return `5,${block.getFieldValue('R')},${block.getFieldValue('G')},${block.getFieldValue('B')},0\n`;
    };

    Blockly.JavaScript['set_led_brightness'] = function(block) {
      return `6,${block.getFieldValue('BRIGHTNESS')},0,0,0\n`;
    };

    Blockly.JavaScript['set_pixel_color'] = function(block) {
      return `7,${block.getFieldValue('INDEX')},${block.getFieldValue('R')},${block.getFieldValue('G')},${block.getFieldValue('B')}\n`;
    };

    Blockly.JavaScript['set_pixel_brightness'] = function(block) {
      return `8,${block.getFieldValue('INDEX')},${block.getFieldValue('BRIGHTNESS')},0,0\n`;
    };

    Blockly.JavaScript['set_pixel_onoff'] = function(block) {
      return `9,${block.getFieldValue('INDEX')},${block.getFieldValue('STATE')},0,0\n`;
    };

    Blockly.JavaScript['ring_pattern_block'] = function(block) {
      const state = block.getFieldValue('RING_STATE');
      const colors = state.split(',');
      let code = '';

      // 1️⃣ Clear the entire ring (one command)
      code += `10,0,0,0,0\n`;
      
      colors.forEach((hex, index) => {
        // Only send if the pixel isn't black
        if (hex !== '#000000') {
          const r = parseInt(hex.slice(1, 3), 16);
          const g = parseInt(hex.slice(3, 5), 16);
          const b = parseInt(hex.slice(5, 7), 16);
          // Command 7: Set individual pixel color
          code += `7,${index},${r},${g},${b}\n`;
        }
      });
      return code;
    };

    Blockly.JavaScript['repeat_n_times'] = function(block) {
      const count = parseInt(block.getFieldValue('COUNT')) || 1;
      const statements = Blockly.JavaScript.statementToCode(block, 'DO');

      let code = '';
      // Opcode 11: LOOP_START
      // d1 = repeat count
      code += `11,${count},0,0,0\n`;
      
      // The code inside the loop
      code += statements;

      // Opcode 12: LOOP_END (OP_LOOP_END in your Arduino code)
      code += `12,0,0,0,0\n`;

      return code;
    };

    Blockly.JavaScript['if_block'] = function(block) {
      // 1. Get the code from the block snapped into the condition slot
      // This will return "1" or "0" based on the comparison
      const conditionCode = Blockly.JavaScript.valueToCode(block, 'CONDITION', Blockly.JavaScript.ORDER_ATOMIC) || '0';
      const statements = Blockly.JavaScript.statementToCode(block, 'DO');

      let code = '';
      // Opcode 20 (IF), Byte1 = condition result (1 or 0)
      code += `32,${conditionCode},0,0,0\n`;
      code += statements;
      code += `33,0,0,0,0\n`; // Opcode 21 (ENDIF)
      return code;
    };

    // Add this to handle the "Comparison" blocks (e.g., 5 > 2)
    Blockly.JavaScript['logic_compare'] = function(block) {
      const left = parseInt(block.getFieldValue('A')) || '0';
      const right = parseInt(block.getFieldValue('B')) || '0';
      const op = block.getFieldValue('OP');
  
      // We evaluate the comparison here and return 1 or 0 to the IF block
      const operators = { 'EQ': '==', 'NEQ': '!=', 'LT': '<', 'LTE': '<=', 'GT': '>', 'GTE': '>=' };
      const result = eval(`${left} ${operators[op]} ${right}`) ? '1' : '0';
      return [result, Blockly.JavaScript.ORDER_ATOMIC];
    };

    // Add this for the "True/False" dropdown block
    Blockly.JavaScript['logic_boolean'] = function(block) {
      const code = (block.getFieldValue('BOOL') === 'TRUE') ? '1' : '0';
      return [code, Blockly.JavaScript.ORDER_ATOMIC];
    };
      // Generator for snap-in AND/OR logic
    Blockly.JavaScript['logic_operation'] = function(block) {
      const left = Blockly.JavaScript.valueToCode(block, 'A', Blockly.JavaScript.ORDER_ATOMIC) || '0';
      const right = Blockly.JavaScript.valueToCode(block, 'B', Blockly.JavaScript.ORDER_ATOMIC) || '0';
      const op = block.getFieldValue('OP');
  
      // Evaluation: 1 is true, 0 is false
      const res = (op === 'AND') ? (left == '1' && right == '1') : (left == '1' || right == '1');
      return [res ? '1' : '0', Blockly.JavaScript.ORDER_ATOMIC];
    };

    // Generator for individual True/False blocks
    Blockly.JavaScript['block_true'] = function(block) { return ['1', Blockly.JavaScript.ORDER_ATOMIC]; };
    Blockly.JavaScript['block_false'] = function(block) { return ['0', Blockly.JavaScript.ORDER_ATOMIC]; };

    // Generator for IF-ELSE block
    Blockly.JavaScript['if_else'] = function(block) {
      const conditionCode = Blockly.JavaScript.valueToCode(block, 'CONDITION', Blockly.JavaScript.ORDER_ATOMIC) || '0';
      const if_Statements = Blockly.JavaScript.statementToCode(block, 'IF_DO');
      const else_Statements = Blockly.JavaScript.statementToCode(block, 'ELSE_DO');

      let code = '';
      // Opcode 32 (IF), Byte1 = condition result (1 or 0)
      code += `32, ${conditionCode},0,0,0\n`;
      code += if_Statements;
      code += `33,0,0,0,0\n`; // Opcode 33: ELSE
      code += else_Statements;
      code += `34,0,0,0,0\n`; // Opcode 34: ENDIF
      return code;
    }; 
    Blockly.JavaScript['set_variable'] = function(block) {
      const varId = block.getFieldValue('VAR');
      const variable = Blockly.getMainWorkspace().getVariableById(varId);
      const varIndex = Blockly.getMainWorkspace().getAllVariables().indexOf(variable);
      const valueCode = Blockly.JavaScript.valueToCode(block,'VALUE',Blockly.JavaScript.ORDER_ATOMIC ) || '0';
      const value = parseInt(valueCode) || 0;
      const low = value & 0xFF;
      const high = (value >> 8) & 0xFF;

      return `40,${varIndex},${low},${high},0\n`;
    };
    Blockly.JavaScript['change_variable'] = function(block) {
      const varId = block.getFieldValue('VAR');
      const variable = Blockly.getMainWorkspace().getVariableById(varId);
      const varIndex = Blockly.getMainWorkspace().getAllVariables().indexOf(variable);
      const valueCode = Blockly.JavaScript.valueToCode(block,'VALUE',Blockly.JavaScript.ORDER_ATOMIC) || '0';
      const value = parseInt(valueCode) || 0;
      const low = value & 0xFF;
      const high = (value >> 8) & 0xFF;

      return `41,${varIndex},${low},${high},0\n`;
    };
    Blockly.JavaScript['variable_get_custom'] = function(block) {
      const varId = block.getFieldValue('VAR');
      const variable = Blockly.getMainWorkspace().getVariableById(varId);
      const varIndex = Blockly.getMainWorkspace().getAllVariables().indexOf(variable);
      return [`50,${varIndex},0,0,0`, Blockly.JavaScript.ORDER_ATOMIC];
    };
    Blockly.JavaScript['get_water_depth'] = function(block) {
      // We use the last known value from the sensor
      const code = window.lastDepth || 0;
      return [code, Blockly.JavaScript.ORDER_ATOMIC];
    };

    Blockly.JavaScript['get_rtc_time'] = function(block) {
      const code = "'" + (window.lastTime || "00:00") + "'";
      return [code, Blockly.JavaScript.ORDER_ATOMIC];
    };
     
    async function detectDevicePort() {
      const ports = await SerialPort.list();

      const devicePort = ports.find((p) => {
        const name = `${p.manufacturer || ''} ${p.path || ''} ${p.friendlyName || ''}`.toLowerCase();

        return (
          name.includes('arduino') ||
          name.includes('wch') ||
          name.includes('ch340') ||
          name.includes('usb-serial') ||
          name.includes('1a86') || // CH340 vendor ID
          name.includes('stmicroelectronics') ||
          name.includes('ftdi') ||
          name.includes('cp210')
        );
      });

      if (!devicePort) {
        console.error('Available ports:', ports);
        throw new Error('No compatible device found');
      }

      console.log('✅ Found device on:', devicePort.path);
      return devicePort.path;
    }

    async function connectToDevice() {
      try {
        const portPath = await detectDevicePort();

        port = new SerialPort({
          path: portPath,
          baudRate: 115200,
        });

        parser = port.pipe(new ReadlineParser({ delimiter: '\n' }));

        parser.on('data', (data) => {
          const line = data.trim();
          if (line.startsWith("VALUE:")) {
            const parts = line.split("|");
            parts.forEach(p => {
                if (p.includes("DEPTH:")) {
                    const val = p.split(":")[2];
                    document.getElementById('depthBadge').textContent = `Depth: ${val} cm`;
                    window.lastDepth = parseFloat(val);
                }
                if (p.includes("TIME:")) {
                    const val = p.replace("TIME:", ""); 
                    document.getElementById('timeBadge').textContent = `Time: ${val}`;
                    window.lastTime = val;
                }
            });
          } else {
            console.log('Device Log:', line);
          }
        });

        port.on('open', () => {
          console.log('Serial port opened successfully');
          window.serialConnected = true;
          updateConnectionStatus(true);
        });

        port.on('error', (err) => {
          console.error('Serial error:', err.message);
          window.serialConnected = false;
          updateConnectionStatus(false);
        });

        port.on('close', () => {
          console.warn('Serial port closed');
          window.serialConnected = false;
          updateConnectionStatus(false);
        });

      } catch (err) {
        console.error('Connection error:', err);
      }
    }

    // --- 💡 Connection Status Indicator ---
    const connectionStatusEl = document.getElementById('connectionStatus');

    async function connectViaBluetooth() {
      try {
        console.log("Requesting Bluetooth Device...");
        bleDevice = await navigator.bluetooth.requestDevice({
          filters: [{ name: 'AquaKit-Hybrid' }],
          optionalServices: [SERVICE_UUID]
        });

        console.log("Connecting to GATT Server...");
        const server = await bleDevice.gatt.connect();

        console.log("Getting Service...");
        const service = await server.getPrimaryService(SERVICE_UUID);

        console.log("Getting Characteristic...");
        bleCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID_RX);

        updateConnectionStatus(true);
        console.log("✅ BLE Connected!");
        
        bleDevice.ongattserverdisconnected = () => {
          console.warn("BLE Disconnected");
          updateConnectionStatus(false);
          bleCharacteristic = null;
        };
        console.log("Starting Notifications...");
        await bleCharacteristic.startNotifications();

        let bleBuffer = "";

        bleCharacteristic.oncharacteristicvaluechanged = (event) => {
          const decoder = new TextDecoder();
          const chunk = decoder.decode(event.target.value);
          bleBuffer += chunk;
          // Only process if we have at least one complete line
          if (bleBuffer.includes('\n')) {
              const lines = bleBuffer.split('\n');
              
              // Keep the last partial piece in the buffer (usually an empty string)
              bleBuffer = lines.pop(); 

              lines.forEach(line => {
                  const cleanLine = line.trim();
                  if (!cleanLine.startsWith("VALUE:")) return;

                  const parts = cleanLine.split("|");
                  parts.forEach(p => {
                      if (p.includes("DEPTH:")) {
                          const val = p.split(":")[2]; // Splits VALUE:DEPTH:XX
                          if (val) {
                              document.getElementById('depthBadge').textContent = `Depth: ${val} cm`;
                              window.lastDepth = parseFloat(val);
                          }
                      }
                      if (p.includes("TIME:")) {
                          const val = p.replace("TIME:", ""); 
                          document.getElementById('timeBadge').textContent = `Time: ${val}`;
                          window.lastTime = val;
                      }
                  });
              });
          }
        };
      } catch (error) {
        console.error("BLE Connection Error:", error);
        alert("Bluetooth Connection Failed: " + error);
      }
    }
    
    function updateConnectionStatus(isConnected) {
      if (isConnected) {
        connectionStatusEl.textContent = "Connected";
        connectionStatusEl.classList.remove("disconnected");
        connectionStatusEl.classList.add("connected");
      } else {
        connectionStatusEl.textContent = "Disconnected";
        connectionStatusEl.classList.remove("connected");
        connectionStatusEl.classList.add("disconnected");
      }
    }

    async function send() {
        if (!port || !port.isOpen) return alert("Connect first!");
        
        let code = Blockly.JavaScript.workspaceToCode(workspace) + "255,0,0,0,0\n"; // End with 0xFF
        console.log("FULL GENERATED CODE:\n", code); // <--- ADD THIS LINE
        document.getElementById('editor').value = code;
        
        const allBytes = code.replace(/\n/g, ',')
                         .split(',')
                         .map(n => n.trim())
                         .filter(n => n.length > 0)
                         .map(n => parseInt(n));

        console.log("CLEAN BYTE ARRAY:", allBytes);

        // 3. Send the bytes in chunks
        // We send 5 bytes (one command), wait for Arduino, then send the next
        for (let i = 0; i < allBytes.length; i += 5) {
            
            // If we hit the 255 (Stop Byte), it might be the only byte left
            const chunk = allBytes.slice(i, i + 5);
            const bytes = Buffer.from(chunk);
            
            port.write(bytes);
            
            // This delay is great—it gives the Arduino time to save to EEPROM 
            // or update the lights before the next 5 bytes arrive.
            await new Promise(r => setTimeout(r, 50)); 
        }
        console.log("Program sent to device");
    }

    // --- 5. INIT ---
    function init() {
      workspace = Blockly.inject('blocklyDiv', { toolbox: document.getElementById('toolbox'), renderer: 'zelos' });
    }

    document.getElementById('view').onchange = (e) => {
      const isBlocks = e.target.value === 'blocks';
      document.getElementById('blocksArea').style.display = isBlocks ? 'flex' : 'none';
      document.getElementById('editorWrap').style.display = isBlocks ? 'none' : 'flex';
      if (!isBlocks) document.getElementById('editor').value = Blockly.JavaScript.workspaceToCode(workspace);
      Blockly.svgResize(workspace);
    };

    // document.getElementById('connectBtn').onclick = connectToDevice;
    // document.getElementById('playBtn').onclick = send;
    // Listen for mode changes
    document.getElementById('connectionMode').onchange = (e) => {
        currentMode = e.target.value;
        updateConnectionStatus(false); // Reset status visually on switch
    };

    // Unified Connect Button
    document.getElementById('connectBtn').onclick = async () => {
        if (currentMode === 'serial') {
            await connectToDevice();
        } else {
            await connectViaBluetooth();
        }
    };

    // Unified Send Button (Replaces the old 'send' function)
    document.getElementById('playBtn').onclick = async () => {
        // 1. Generate the bytes
        const code = Blockly.JavaScript.workspaceToCode(workspace) + "255\n";
        const allBytes = code.replace(/\n/g, ',')
                             .split(',')
                             .map(n => n.trim())
                             .filter(n => n.length > 0 && !isNaN(n))
                             .map(n => parseInt(n));

        if (currentMode === 'serial') {
            if (!port || !port.isOpen) return alert("Connect USB first!");
            // Send in 5-byte chunks for Serial
            for (let i = 0; i < allBytes.length; i += 5) {
                port.write(Buffer.from(allBytes.slice(i, i + 5)));
                await new Promise(r => setTimeout(r, 50));
            }
        } else {
            if (!bleCharacteristic) return alert("Connect Bluetooth first!");
            // Send in chunks for BLE (Max 20 bytes per write)
            for (let i = 0; i < allBytes.length; i += 20) {
                const chunk = new Uint8Array(allBytes.slice(i, i + 20));
                await bleCharacteristic.writeValue(chunk);
                await new Promise(r => setTimeout(r, 100)); // BLE needs a bit more time
            }
        }
        console.log("Program sent!");
    };
    
    window.onload = init;
  </script>
